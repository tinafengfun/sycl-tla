name: "TorchInductor CUTLASS UTs"
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  merge_group:
    branches: [ "main" ]
  workflow_dispatch:

permissions: {}

jobs:
  run-cutlass-test:
    name: Run TorchInductor CUTLASS test
    runs-on: bmg
    timeout-minutes: 120
  
    steps:
      - name: Checkout sycl-tla repo
        uses: actions/checkout@v4

      - name: Install Python venv package
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-venv

      - name: Install Intel graphics drivers
        uses: ./.github/actions/install-intel-graphics
        with:
          GPU: 'BMG'
          IGC: 'ROLLING'

      - name: Install DPC++
        id: install_dpcpp
        uses: ./.github/actions/install-dpcpp
        with:
          DPCPP_RELEASE: TORCH_SUPPORTED
          DPCPP_PATH: ~/dpcpp

      - name: Install MKL
        shell: bash
        run: |
          if [ -d /home/ghrunner/intel/oneapi/mkl ]; then
            echo "MKL already installed at /home/ghrunner/intel/oneapi/mkl"
          else
            echo "Installing MKL..."
            if [ -f $PWD/intel-deep-learning-essentials-2025.3.2.36_offline.sh ]; then
              echo "DL Installer exists!"
            else
              sudo wget https://registrationcenter-download.intel.com/akdlm/IRC_NAS/b3e6c1bf-a6d5-4580-8b1d-80cbfd38c8af/intel-deep-learning-essentials-2025.3.2.36_offline.sh
            fi
            bash intel-deep-learning-essentials-2025.3.2.36_offline.sh -a --action modify --silent --eula accept --components intel.oneapi.lin.mkl.devel
          fi
          . /home/ghrunner/intel/oneapi/mkl/latest/env/vars.sh
          env >> $GITHUB_ENV

      - name: Setup virtual environment
        shell: bash
        run: |
          python3 -m venv ~/.pytorch-venv
          source ~/.pytorch-venv/bin/activate
          . setvars.sh
          env >> $GITHUB_ENV

      - name: Install nightly PyTorch
        shell: bash
        run: |
          source ~/.pytorch-venv/bin/activate
          python3 --version
          python3 -m pip install --pre torch==2.13.0.dev20260515+xpu --index-url https://download.pytorch.org/whl/nightly/xpu --force-reinstall

      - name: Print IGC2 version
        shell: bash
        run: |
          dpkg-query --show libigc2

      - name: Print PyTorch package version
        shell: bash
        run: |
          source ~/.pytorch-venv/bin/activate
          python3 -m pip list | grep -i torch

      - name: Clone PyTorch fork and install requirements
        shell: bash
        run: |
          source ~/.pytorch-venv/bin/activate
          cd ${{ runner.temp }}
          git clone https://github.com/pytorch/pytorch.git
          cd pytorch
          git checkout aff3311fabd30ebffa9153e1bcf577512291a8a1
          python3 -m pip install -r requirements.txt
          python3 -m pip install unittest-xml-reporting

      - name: Check Device compatibility
        shell: bash
        run: |
          source ~/.pytorch-venv/bin/activate
          export USE_XPU=1
          export CUTLASS_USE_SYCL=1
          export ONEAPI_DEVICE_SELECTOR=level_zero:gpu
          export TORCH_XPU_ARCH_LIST=bmg
          export TORCHINDUCTOR_CUTLASS_DIR="${GITHUB_WORKSPACE}"
          python -c "import torch; print(torch.__version__)"
          python -c "import torch; print(torch.xpu.get_device_capability()['device_id'])"
          python3 -m pip list | grep -i triton

      - name: Debug big GPU detection
        shell: bash
        run: |
          source ~/.pytorch-venv/bin/activate
          export USE_XPU=1
          export CUTLASS_USE_SYCL=1
          export ONEAPI_DEVICE_SELECTOR=level_zero:gpu
          export TORCH_XPU_ARCH_LIST=bmg
          export TORCHINDUCTOR_CUTLASS_DIR="${GITHUB_WORKSPACE}"
          python3 - <<'PY'
          import torch
          from torch._inductor.utils import is_big_gpu
          from torch.testing._internal.inductor_utils import HAS_CPU

          print("HAS_CPU =", HAS_CPU)
          print("xpu available =", torch.xpu.is_available())
          if torch.xpu.is_available():
              p = torch.xpu.get_device_properties(0)
              print("device props =", p)
              print("multi_processor_count =", getattr(p, "multi_processor_count", None))
          print("is_big_gpu =", is_big_gpu())
          PY

      - name: Run TorchInductor EVT test
        shell: bash
        run: |
          rm -rf /tmp/torchinductor_*
          source ~/.pytorch-venv/bin/activate
          export USE_XPU=1
          export CUTLASS_USE_SYCL=1
          export ONEAPI_DEVICE_SELECTOR=level_zero:gpu
          export TORCH_XPU_ARCH_LIST=bmg
          export TORCHINDUCTOR_CUTLASS_DIR="${GITHUB_WORKSPACE}"
          mkdir -p ${GITHUB_WORKSPACE}/logs/
          cd ${{ runner.temp }}/pytorch
          python3 test/inductor/test_cutlass_evt.py -v 2>&1 | tee ${GITHUB_WORKSPACE}/logs/cutlass_inductor_evt.log

      - name: Run TorchInductor Backend test
        shell: bash
        run: |
          rm -rf /tmp/torchinductor_*
          source ~/.pytorch-venv/bin/activate
          export USE_XPU=1
          export CUTLASS_USE_SYCL=1
          export ONEAPI_DEVICE_SELECTOR=level_zero:gpu
          export TORCH_XPU_ARCH_LIST=bmg
          export TORCHINDUCTOR_CUTLASS_DIR="${GITHUB_WORKSPACE}"
          mkdir -p ${GITHUB_WORKSPACE}/logs/
          cd ${{ runner.temp }}/pytorch
          python3 test/inductor/test_cutlass_backend.py -v  2>&1 | tee ${GITHUB_WORKSPACE}/logs/cutlass_inductor_backend.log

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-artifacts
          path: logs/

      - name: Cleanup PyTorch repo and wheel
        if: always()
        shell: bash
        run: |
          rm -rf ${{ runner.temp }}/pytorch


